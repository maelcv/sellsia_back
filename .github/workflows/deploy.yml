name: CI/CD Backend Express

on:
  push:
    branches: [ "cicd" ] # Se déclenche au push sur la branche cicd

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v3

      - name: ⚙️ Configuration de Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22' # Mets la version que tu utilises

      - name: 🏗️ Installation et vérification (Build)
        run: |
          npm ci
          # npm run build # Décommente cette ligne si tu utilises TypeScript

      - name: 🧹 Nettoyer l'ancienne version sur le serveur
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/ceremia/api
            rm -rf src ia_models package*.json server.js prisma node_modules 2>/dev/null || true

      - name: 🚀 Déploiement des fichiers sur le serveur
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "src,ia_models,package.json,package-lock.json,server.js,prisma"
          target: "/var/www/ceremia/api"

      - name: 📦 Installation des dépendances système Chromium
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo apt-get update -y
            sudo apt-get install -y chromium-browser libglib2.0-0 libnss3 libnspr4 libatk1.0-0 \
              libatk-bridge2.0-0 libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libxcomposite1 \
              libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2 libpango-1.0-0 \
              libpangocairo-1.0-0 libgtk-3-0 libx11-xcb1 libxcursor1 libxi6 libxtst6 2>/dev/null || \
            sudo apt-get install -y chromium 2>/dev/null || true

      - name: 🔄 Redémarrage de l'API avec PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -ic 'cd /var/www/ceremia/api && npm install --production && npm install -g pm2 && npx prisma migrate deploy && pm2 delete api-express 2>/dev/null; pm2 start server.js --name "api-express" && pm2 save'
            